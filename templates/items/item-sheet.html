<form class="{{cssClass}}" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img" src="{{img}}" data-edit="img" title="{{name}}" />
    <div class="header-col">
      <h1 class="charname">
        <input name="name" type="text" value="{{name}}" placeholder="Item Name" />
      </h1>
      <div class="details">
        <div class="form-group">
          <label>Cost (sp)</label>
          <input type="number" name="system.cost" value="{{system.cost}}" min="0" />
        </div>
        <div class="form-group">
          <label>Weight</label>
          <input type="number" name="system.weight" value="{{system.weight}}" min="0" step="0.1" />
        </div>
        <div class="form-group">
          <label>Size</label>
          <select name="system.sizeCat">
            <option value="T" {{#if (eq system.sizeCat "T")}}selected{{/if}}>T (Tiny)</option>
            <option value="S" {{#if (eq system.sizeCat "S")}}selected{{/if}}>S (Small)</option>
            <option value="M" {{#if (eq system.sizeCat "M")}}selected{{/if}}>M (Medium)</option>
            <option value="L" {{#if (eq system.sizeCat "L")}}selected{{/if}}>L (Large)</option>
            <option value="W" {{#if (eq system.sizeCat "W")}}selected{{/if}}>W (Worn)</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <section class="sheet-body">
    <div class="flexrow">
      <div class="stats">
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" name="system.quantity.value" value="{{system.quantity.value}}" min="0" />
        </div>

        <div class="form-group">
          <label>Max Uses (0 = unlimited)</label>
          <input type="number" name="system.quantity.max" value="{{system.quantity.max}}" min="0" />
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" name="system.equipped" {{checked system.equipped}} />
            Equipped/Carried
          </label>
        </div>

        <div class="form-group">
          <label>Carry Location</label>
          <select name="system.carryLocation">
            <option value="">-- Select --</option>
            <option value="hand-primary" {{#if (eq system.carryLocation "hand-primary")}}selected{{/if}}>Hand (Primary)</option>
            <option value="hand-secondary" {{#if (eq system.carryLocation "hand-secondary")}}selected{{/if}}>Hand (Secondary)</option>
            <option value="belt-1" {{#if (eq system.carryLocation "belt-1")}}selected{{/if}}>Belt Slot 1</option>
            <option value="belt-2" {{#if (eq system.carryLocation "belt-2")}}selected{{/if}}>Belt Slot 2</option>
            <option value="belt-3" {{#if (eq system.carryLocation "belt-3")}}selected{{/if}}>Belt Slot 3</option>
            <option value="slung" {{#if (eq system.carryLocation "slung")}}selected{{/if}}>Slung</option>
            <option value="worn" {{#if (eq system.carryLocation "worn")}}selected{{/if}}>Worn</option>
            <option value="stored" {{#if (eq system.carryLocation "stored")}}selected{{/if}}>Stored in Container</option>
          </select>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" name="system.treasure" {{checked system.treasure}} />
            Is Treasure
          </label>
        </div>
      </div>

      <div class="description">
        <label>Description</label>
        <textarea name="system.description" placeholder="Item description...">{{system.description}}</textarea>
      </div>
    </div>
  </section>
</form>
