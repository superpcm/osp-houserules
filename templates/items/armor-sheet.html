<form class="{{cssClass}}" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img is-pos-armor-image" src="{{img}}" data-edit="img" title="{{name}}" />
    <div class="header-col">
      <h1 class="charname is-pos-armor-name">
        {{#if @root.isGM}}
          <input type="text" name="name" value="{{name}}" />
        {{else}}
          <span>{{name}}</span>
        {{/if}}
      </h1>
      <div class="details">
        <div class="form-group">
          <input type="number" class="is-pos-cost" name="system.cost" value="{{system.cost}}" min="0" {{#unless @root.isGM}}readonly disabled{{/unless}} />
        </div>
        <div class="form-group">
          <input type="number" class="is-pos-weight" name="system.unitWeight" value="{{system.unitWeight}}" min="0" step="0.1" {{#unless @root.isGM}}readonly disabled{{/unless}} />
        </div>
                <div class="form-group">
          <input type="number" class="is-pos-size" name="system.storedSize" value="{{system.storedSize}}" min="0" step="0.25" {{#unless @root.isGM}}readonly disabled{{/unless}} />
        </div>
      </div>
    </div>
  </header>

  <section class="sheet-body">
    <div class="flexrow">
      <div class="stats">
        <div class="form-group">
          <input type="number" class="is-pos-armor-class" value="{{system.aac.value}}" min="0" max="20" readonly disabled />
        </div>

        <div class="form-group">
          <select class="is-pos-armor-type" disabled>
            <option value="">Select Type</option>
            <option value="light" {{#if (eq system.type "light")}}selected{{/if}}>Light</option>
            <option value="medium" {{#if (eq system.type "medium")}}selected{{/if}}>Medium</option>
            <option value="heavy" {{#if (eq system.type "heavy")}}selected{{/if}}>Heavy</option>
            <option value="shield" {{#if (eq system.type "shield")}}selected{{/if}}>Shield</option>
          </select>
        </div>

        <div class="form-group">
          <input type="number" class="is-pos-quantity" name="system.quantity.value" value="{{system.quantity.value}}" min="0" />
        </div>
      </div>

      <div class="description">
        <textarea class="is-pos-description" name="system.description" {{#unless @root.isGM}}readonly disabled{{/unless}}>{{system.description}}</textarea>
      </div>
    </div>
  </section>
</form>
