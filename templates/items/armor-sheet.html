<form class="{{cssClass}}" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img is-pos-armor-image" src="{{img}}" data-edit="img" title="{{name}}" />
    <div class="header-col">
      <h1 class="charname is-pos-armor-name">
        {{#if @root.isGM}}
          <input type="text" name="name" value="{{name}}" />
        {{else}}
          <span>{{name}}</span>
        {{/if}}
      </h1>
      <div class="details">
        <div class="form-group">
          <input type="number" class="is-pos-cost" name="system.cost" value="{{system.cost}}" min="0" {{#unless @root.isGM}}readonly disabled{{/unless}} />
        </div>
        <div class="form-group">
          <input type="number" class="is-pos-weight" name="system.weight" value="{{system.weight}}" min="0" step="0.1" {{#unless @root.isGM}}readonly disabled{{/unless}} />
        </div>
                <div class="form-group">
          <input type="text" class="is-pos-size" name="system.sizeCat" value="{{system.sizeCat}}" maxlength="3" {{#unless @root.isGM}}readonly disabled{{/unless}} />
        </div>
      </div>
    </div>
  </header>

  <section class="sheet-body">
    <div class="flexrow">
      <div class="stats">
        <div class="form-group">
          <label>Armor Class (Ascending)</label>
          <input type="number" class="is-pos-armor-class" value="{{system.aac.value}}" min="0" max="20" readonly disabled />
        </div>

        <div class="form-group">
          <label>Armor Type</label>
          <select class="is-pos-armor-type" disabled>
            <option value="">Select Type</option>
            <option value="light" {{#if (eq system.type "light")}}selected{{/if}}>Light</option>
            <option value="medium" {{#if (eq system.type "medium")}}selected{{/if}}>Medium</option>
            <option value="heavy" {{#if (eq system.type "heavy")}}selected{{/if}}>Heavy</option>
            <option value="shield" {{#if (eq system.type "shield")}}selected{{/if}}>Shield</option>
          </select>
        </div>

        <div class="form-group">
          <label>Quantity</label>
          <input type="number" class="is-pos-quantity" name="system.quantity.value" value="{{system.quantity.value}}" min="0" />
        </div>

        <div class="form-group is-pos-equipped-checkbox">
          <label>
            <input type="checkbox" name="system.equipped" {{checked system.equipped}} />
          </label>
        </div>

        <div class="form-group">
          <select class="is-pos-carry-location" name="system.carryLocation">
            <option value="">-- Select --</option>
            <option value="worn" {{#if (eq system.carryLocation "worn")}}selected{{/if}}>Worn</option>
            <option value="hand-secondary" {{#if (eq system.carryLocation "hand-secondary")}}selected{{/if}}>Hand (Shield)</option>
            <option value="stored" {{#if (eq system.carryLocation "stored")}}selected{{/if}}>Stored in Container</option>
          </select>
        </div>
      </div>

      <div class="description">
        <textarea class="is-pos-description" name="system.description" {{#unless @root.isGM}}readonly disabled{{/unless}}>{{system.description}}</textarea>
      </div>
    </div>
  </section>
</form>
