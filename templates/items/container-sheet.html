<form class="{{cssClass}}" autocomplete="off">
  <header class="sheet-header">
    <img class="profile-img" src="{{img}}" data-edit="img" title="{{name}}" />
    <div class="header-col">
      <h1 class="charname">
        <input name="name" type="text" value="{{name}}" placeholder="Container Name" />
      </h1>
      <div class="details">
        <div class="form-group">
          <label>Cost (sp)</label>
          <input type="number" name="system.cost" value="{{system.cost}}" min="0" />
        </div>
        <div class="form-group">
          <label>Weight</label>
          <input type="number" name="system.weight" value="{{system.weight}}" min="0" step="0.1" />
        </div>
        <div class="form-group">
          <label>Size</label>
          <select name="system.sizecat">
            <option value="S" {{#if (eq system.sizecat "S")}}selected{{/if}}>S (Small)</option>
            <option value="M" {{#if (eq system.sizecat "M")}}selected{{/if}}>M (Medium)</option>
            <option value="L" {{#if (eq system.sizecat "L")}}selected{{/if}}>L (Large)</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <section class="sheet-body">
    <div class="flexrow">
      <div class="stats">
        <div class="form-group">
          <label>Capacity</label>
          <input type="text" name="system.capacity" value="{{system.capacity}}" placeholder="6M" />
          <small>Format: number + size (e.g., 6M, 1L, 4M, 12S)</small>
        </div>

        <div class="form-group">
          <label>Used / Max Capacity</label>
          <div class="capacity-display">
            <span>{{system.capacityUsed}} / {{system.capacityMax}} slots</span>
            {{#if system.capacityMax}}
            <span>({{system.capacityPercentage}}%)</span>
            {{/if}}
          </div>
        </div>

        <div class="form-group">
          <label>Quantity</label>
          <input type="number" name="system.quantity.value" value="{{system.quantity.value}}" min="0" />
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" name="system.equipped" {{checked system.equipped}} />
            Equipped/Carried
          </label>
        </div>

        <div class="form-group">
          <label>Carry Location</label>
          <select name="system.carryLocation">
            <option value="">-- Select --</option>
            <option value="hand-primary" {{#if (eq system.carryLocation "hand-primary")}}selected{{/if}}>Hand (Primary)</option>
            <option value="hand-secondary" {{#if (eq system.carryLocation "hand-secondary")}}selected{{/if}}>Hand (Secondary)</option>
            <option value="slung" {{#if (eq system.carryLocation "slung")}}selected{{/if}}>Slung</option>
            <option value="lashed-top" {{#if (eq system.carryLocation "lashed-top")}}selected{{/if}}>Lashed (Top)</option>
            <option value="lashed-bottom" {{#if (eq system.carryLocation "lashed-bottom")}}selected{{/if}}>Lashed (Bottom)</option>
            <option value="lashed-side-1" {{#if (eq system.carryLocation "lashed-side-1")}}selected{{/if}}>Lashed (Side 1)</option>
            <option value="lashed-side-2" {{#if (eq system.carryLocation "lashed-side-2")}}selected{{/if}}>Lashed (Side 2)</option>
            <option value="stored" {{#if (eq system.carryLocation "stored")}}selected{{/if}}>Stored in Container</option>
          </select>
        </div>
      </div>

      <div class="description">
        <label>Description</label>
        <textarea name="system.description" placeholder="Container description...">{{system.description}}</textarea>
      </div>
    </div>
  </section>
</form>
